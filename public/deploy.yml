name: Deploy (Vite -> Hostinger)

on:
 push:
 branches: [ "main" ]

jobs:
 build-and-deploy:
 runs-on: ubuntu-latest
 steps:
 - uses: actions/checkout@v4

 - uses: actions/setup-node@v4
 with:
 node-version: "20"

 - run: npm ci
 - run: npm run build

 - name: Upload dist to Hostinger (FTP)
 uses: SamKirkland/FTP-Deploy-Action@v4.3.5
 with:
 server: ftp.calculadoranewvox.com
 username: u959806421.deploy
 password: ${{ secrets.FTP_PASSWORD }}
 local-dir: dist/
 server-dir: ./
